<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="32" fill="#0d9488"/>

  <!-- Gear (behind car, top-right) -->
  <g transform="translate(132,58)">
    <circle r="20" fill="#fbbf24"/>
    <g fill="#fbbf24">
      <rect x="-4" y="-27" width="8" height="7" rx="1.5"/>
      <rect x="-4" y="20" width="8" height="7" rx="1.5"/>
      <rect x="-27" y="-4" width="7" height="8" rx="1.5"/>
      <rect x="20" y="-4" width="7" height="8" rx="1.5"/>
      <rect x="12" y="-23" width="7" height="8" rx="1.5" transform="rotate(45 15.5 -19)"/>
      <rect x="-19" y="-23" width="7" height="8" rx="1.5" transform="rotate(-45 -15.5 -19)"/>
      <rect x="12" y="15" width="7" height="8" rx="1.5" transform="rotate(-45 15.5 19)"/>
      <rect x="-19" y="15" width="7" height="8" rx="1.5" transform="rotate(45 -15.5 19)"/>
    </g>
    <circle r="12" fill="#0d9488"/>
    <circle r="4" fill="#fbbf24"/>
  </g>

  <!-- Spanner (behind car, bottom-left) -->
  <g transform="translate(60,140) rotate(40)">
    <rect x="-3" y="-24" width="6" height="34" rx="2.5" fill="#fbbf24"/>
    <path d="M-7-24c-1-3 0-7 3-9c3-2 7 1 8 4l1 5h-12z" fill="#fbbf24"/>
  </g>

  <!-- Car -->
  <g transform="translate(86,90)">
    <!-- Body -->
    <rect x="-32" y="0" width="58" height="14" rx="3" fill="#fff"/>
    <!-- Cabin -->
    <rect x="-20" y="-12" width="28" height="12" rx="2.5" fill="#fff"/>
    <!-- Windows -->
    <rect x="-16" y="-9" width="9" height="7" rx="1.5" fill="#0d9488" opacity="0.3"/>
    <rect x="-3" y="-9" width="9" height="7" rx="1.5" fill="#0d9488" opacity="0.3"/>
    <!-- Hood slope -->
    <path d="M8 0 L18 -6 L26 0 Z" fill="#fff"/>
    <!-- Wheels -->
    <circle cx="-14" cy="14" r="7" fill="#1e293b"/>
    <circle cx="-14" cy="14" r="2.5" fill="#94a3b8"/>
    <circle cx="16" cy="14" r="7" fill="#1e293b"/>
    <circle cx="16" cy="14" r="2.5" fill="#94a3b8"/>
    <!-- Headlight -->
    <circle cx="24" cy="6" r="2" fill="#fbbf24"/>
  </g>
</svg>
